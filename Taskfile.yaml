version: '3'

tasks:
  lint:
    desc: "Запускает golangci-lint"
    silent: true
    cmds:
      - pre-commit run golangci-lint --all-files

  run:
    desc: "Запускает приложение используя конфиг"
    silent: true
    cmds:
      - go run ./cmd/app/main.go --config config.yaml

  docker:up:
    desc: "Поднимает все Docker-контейнеры"
    cmds:
      - docker compose up -d

  docker:rebuild:
    desc: "Пересобирает образ приложения и перезапускает контейнер"
    cmds:
      - docker compose up -d --build app

  docker:logs:
    desc: "Показывает логи приложения в реальном времени"
    cmds:
      - docker compose logs -f app

  docker:down:
    desc: "Останавливает и удаляет все Docker-контейнеры"
    cmds:
      - docker compose down

  test:unit:
    desc: "Запускает unit-тесты"
    silent: true
    cmds:
      - go test -count=1 -race ./...

  test:integration:
    desc: "Запускает интеграционные тесты через testcontainers (требуется Docker)"
    silent: true
    cmds:
      - go test -count=1 -tags integration -timeout 300s
          ./internal/kafka/
          ./internal/repository/image_repo/
          ./internal/repository/variant_repo/

  test:all:
    desc: "Запускает все тесты: unit + интеграционные (требуется Docker)"
    silent: true
    cmds:
      - go test -count=1 -tags integration -race -timeout 300s ./...

  test:coverage:unit:
    desc: "Покрытие unit-тестов по всем пакетам"
    silent: true
    cmds:
      - go test -count=1 -covermode=atomic -coverprofile=coverage.out ./...
      - go tool cover -func=coverage.out

  test:coverage:integration:
    desc: "Покрытие интеграционных тестов по пакетам с интеграционными тестами"
    silent: true
    cmds:
      - go test -count=1 -tags integration -timeout 300s -covermode=atomic -coverprofile=coverage.out ./internal/kafka/ ./internal/repository/image_repo/ ./internal/repository/variant_repo/
      - go tool cover -func=coverage.out

  test:coverage:html:
    desc: "Открывает HTML-отчёт покрытия всех тестов в браузере (требуется Docker)"
    silent: true
    cmds:
      - go test -count=1 -tags integration -timeout 300s -covermode=atomic -coverprofile=coverage.out ./...
      - go tool cover -html=coverage.out

  docker:down:volumes:
    desc: "Останавливает контейнеры и удаляет все volumes"
    cmds:
      - docker compose down -v
